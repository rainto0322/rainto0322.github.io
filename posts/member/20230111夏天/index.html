<time datetime=2023-01-11T08:00:00-07:00>January 11, 2023</time></div><div><p>公路上车马喧嚣，景点里人山人海，城市内外聒噪万分，实在没有拥挤的必要。</p><p>找一安静角落，坐下来，广州的夏天太可爱，安静地坐在那里，光透过榕树叶的间隙。树木葱茏，有太多事可以做，很多话因此没必要紧迫地说。风和日丽，适合煮茶，看花，烧烤，与家人一起看海。偶尔有松果落下来。</p><p>春天万物变化，
春天空空如也。
不过是转一转头罢了。</p></div><div><ul class=tags><li><span class=anchor>#</span><a href=/tags/%E5%B9%BF%E5%B7%9E/>广州</a></li><li><span class=anchor>#</span><a href=/tags/%E5%A4%8F%E5%A4%A9/>夏天</a></li><li><span class=anchor>#</span><a href=/tags/%E7%94%9F%E6%B4%BB%E7%A2%8E%E7%89%87/>生活碎片</a></li></ul></div></main><footer><a href=#>返回顶部 ↑</a><p>©&nbsp;2024&nbsp;雨巷 | <a href=https://github.com/rainto0322/hugo-theme-rain target=_blank rel="noopener noreferrer">RAIN</a> THEME</p></footer></body></html>
